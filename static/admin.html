<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root { --sidebar-w: 240px; }
        body { background: #0e0c1e; }
        /* Login */
        #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box {
            background: var(--page-card-bg, rgba(22,28,50,0.65));
            backdrop-filter: blur(14px); border: 1px solid var(--page-card-border, rgba(120,135,210,0.18));
            border-radius: var(--radius-lg,20px); padding: 40px; width: 380px; max-width: 90vw;
        }
        .login-box h1 { font-size: 1.6rem; margin-bottom: 8px; }
        .login-box .sub { color: var(--text-secondary, #98a0c8); font-size: 0.85rem; margin-bottom: 24px; }
        .login-box input { width:100%; padding:12px 14px; margin-bottom:12px; background:rgba(0,0,0,0.3); border:1px solid var(--page-card-border, rgba(120,135,210,0.18)); border-radius:var(--radius-sm,8px); color:var(--text-primary,#d8ddf8); font-size:0.95rem; outline:none; }
        .login-box input:focus { border-color: var(--accent-1, #818cf8); box-shadow: 0 0 12px var(--glow-1); }
        .login-box button { width:100%; padding:12px; background:var(--gradient-1, linear-gradient(135deg,#818cf8,#a78bfa,#60a5fa)); color:#fff; border:none; border-radius:var(--radius-sm,8px); font-size:0.95rem; cursor:pointer; font-weight:600; }
        .login-err { color: var(--danger); font-size:0.85rem; margin-top:10px; text-align:center; }

        /* Dashboard */
        #dashboard { display:none; }
        .topbar {
            position:fixed; top:0; left:0; right:0; z-index:100;
            display:flex; justify-content:space-between; align-items:center;
            padding:12px 28px; height:56px;
            background:rgba(14,12,30,0.85); backdrop-filter:blur(14px);
            border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .topbar h2 { font-size:1rem; font-family:var(--font-mono); }
        .topbar .logout-btn { padding:6px 16px; background:var(--danger); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:0.82rem; }
        .layout { display:flex; padding-top:56px; min-height:100vh; }
        .sidebar {
            position:fixed; top:56px; left:0; bottom:0; width:var(--sidebar-w);
            background:rgba(14,12,28,0.6); border-right:1px solid rgba(255,255,255,0.05);
            padding:16px 0; overflow-y:auto; z-index:50;
        }
        .sidebar h4 { padding:8px 20px; font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; font-family:var(--font-mono); }
        .sidebar a { display:flex; align-items:center; gap:10px; padding:10px 20px; color:var(--text-secondary); font-size:0.88rem; cursor:pointer; transition:all 0.2s; text-decoration:none; border-left:2px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color:var(--text-primary); background:rgba(255,255,255,0.03); border-left-color:var(--accent-1,#818cf8); }
        .sidebar .badge { background:var(--danger); color:#fff; font-size:0.68rem; padding:1px 7px; border-radius:10px; margin-left:auto; }
        .content { margin-left:var(--sidebar-w); flex:1; padding:28px 32px; min-width:0; }

        /* Panels */
        .panel { display:none; }
        .panel.active { display:block; }

        /* Content editor - preview cards that look like the real site */
        .edit-section {
            background:var(--page-card-bg, rgba(22,28,50,0.55));
            backdrop-filter:blur(8px); border:1px solid var(--page-card-border, rgba(120,135,210,0.13));
            border-radius:var(--radius-lg,20px); padding:24px; margin-bottom:20px;
            position:relative;
        }
        .edit-section h3 { font-family:var(--font-mono); font-size:1rem; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
        .edit-section .sec-desc { font-size:0.8rem; color:var(--text-muted); margin-bottom:16px; }
        .edit-section .preview-box {
            background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.06);
            border-radius:var(--radius-sm,8px); padding:16px; margin-bottom:14px;
            font-size:0.9rem; line-height:1.6; color:var(--text-secondary);
            white-space:pre-wrap; min-height:40px;
        }
        .edit-section .preview-box:empty::before { content:'（空）'; color:var(--text-muted); font-style:italic; }
        .edit-row { margin-bottom:10px; }
        .edit-row label { display:block; font-size:0.78rem; color:var(--text-muted); margin-bottom:4px; font-family:var(--font-mono); }
        .edit-row input, .edit-row textarea {
            width:100%; padding:10px 12px;
            background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08);
            border-radius:var(--radius-sm,8px); color:var(--text-primary);
            font-family:var(--font-sans); font-size:0.88rem; outline:none; resize:vertical;
            transition:border-color 0.2s;
        }
        .edit-row textarea { min-height:80px; }
        .edit-row input:focus, .edit-row textarea:focus { border-color:var(--accent-1,#818cf8); box-shadow:0 0 10px var(--glow-1); }
        .btn-save {
            padding:9px 22px; background:var(--gradient-1); color:#fff; border:none;
            border-radius:var(--radius-sm,8px); cursor:pointer; font-weight:600; font-size:0.85rem;
            box-shadow:0 4px 16px var(--glow-1);
        }
        .btn-save:hover { box-shadow:0 6px 24px var(--glow-1); }
        .save-ok { color:var(--success); font-size:0.82rem; margin-left:10px; }

        /* Messages */
        .msg-card {
            background:var(--page-card-bg); border:1px solid var(--page-card-border);
            border-radius:var(--radius); padding:18px; margin-bottom:12px;
        }
        .msg-card.unread { border-left:3px solid var(--accent-1); }
        .msg-top { display:flex; justify-content:space-between; margin-bottom:8px; }
        .msg-top strong { font-size:0.95rem; }
        .msg-top .time { font-size:0.78rem; color:var(--text-muted); }
        .msg-email { font-size:0.8rem; color:var(--text-muted); margin-bottom:8px; }
        .msg-body { font-size:0.88rem; line-height:1.5; }
        .msg-acts { margin-top:10px; display:flex; gap:8px; }
        .msg-acts button {
            padding:5px 14px; border:1px solid rgba(255,255,255,0.1); background:transparent;
            color:var(--text-secondary); border-radius:5px; cursor:pointer; font-size:0.78rem;
        }
        .msg-acts button:hover { border-color:var(--accent-1); color:var(--accent-1); }
        .msg-acts button.del:hover { border-color:var(--danger); color:var(--danger); }
        .empty-msg { color:var(--text-muted); text-align:center; padding:40px; }

        /* Account */
        .acct-block { margin-bottom:20px; }
        .acct-block h4 { font-size:0.95rem; margin-bottom:10px; }
        .acct-row { margin-bottom:10px; }
        .acct-row label { display:block; font-size:0.78rem; color:var(--text-muted); margin-bottom:4px; }
        .acct-row input { width:100%; max-width:360px; padding:10px 12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius-sm); color:var(--text-primary); font-size:0.88rem; outline:none; }
        .acct-row input:focus { border-color:var(--accent-1); }

        @media (max-width:700px) {
            .sidebar { width:100%; position:relative; top:auto; display:flex; overflow-x:auto; padding:8px 0; border-right:none; border-bottom:1px solid rgba(255,255,255,0.05); }
            .sidebar a { white-space:nowrap; border-left:none; border-bottom:2px solid transparent; }
            .sidebar a.active { border-left:none; border-bottom-color:var(--accent-1); }
            .sidebar h4 { display:none; }
            .layout { flex-direction:column; }
            .content { margin-left:0; padding:20px 16px; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
    <form class="login-box" id="login-form" autocomplete="off">
        <h1>管理后台</h1>
        <div class="sub">登录以编辑网站内容和查看留言</div>
        <input type="text" id="login-user" placeholder="用户名" required>
        <input type="password" id="login-pass" placeholder="密码" required>
        <button type="submit">登 录</button>
        <div class="login-err" id="login-error"></div>
    </form>
</div>

<!-- Dashboard -->
<div id="dashboard">
    <div class="topbar">
        <h2>&lt;Admin /&gt;</h2>
        <button class="logout-btn" onclick="logout()">退出</button>
    </div>
    <div class="layout">
        <nav class="sidebar">
            <h4>内容编辑</h4>
            <a class="active" data-panel="edit-home">首页</a>
            <a data-panel="edit-about">关于我</a>
            <a data-panel="edit-contact">联系方式</a>
            <h4>管理</h4>
            <a data-panel="messages-panel">留言管理 <span class="badge" id="unread-badge">0</span></a>
            <a data-panel="account-panel">账号设置</a>
        </nav>
        <div class="content" id="content-area">

            <!-- ====== Edit Home ====== -->
            <div class="panel active" id="edit-home">
                <h2 style="font-family:var(--font-mono);font-size:1.3rem;margin-bottom:20px">编辑 · 首页</h2>

                <div class="edit-section">
                    <h3>姓名</h3>
                    <div class="sec-desc">首页大标题中高亮显示的名字</div>
                    <div class="preview-box" id="prev-hero-name"></div>
                    <div class="edit-row"><label>姓名</label><input id="ed-hero-name" oninput="livePrev('hero-name')"></div>
                </div>

                <div class="edit-section">
                    <h3>副标题</h3>
                    <div class="sec-desc">姓名下方的学校/专业/届别信息</div>
                    <div class="preview-box" id="prev-hero-subtitle"></div>
                    <div class="edit-row"><label>副标题</label><input id="ed-hero-subtitle" oninput="livePrev('hero-subtitle')"></div>
                </div>

                <div class="edit-section">
                    <h3>打字机轮播短语</h3>
                    <div class="sec-desc">首页标题下方循环打字的文字，用逗号分隔多个短语</div>
                    <div class="preview-box" id="prev-hero-phrases"></div>
                    <div class="edit-row"><label>短语（逗号分隔）</label><input id="ed-hero-phrases" oninput="livePrev('hero-phrases')"></div>
                </div>

                <button class="btn-save" onclick="saveContent('hero')">保存首页内容</button><span class="save-ok" id="status-hero"></span>
            </div>

            <!-- ====== Edit About ====== -->
            <div class="panel" id="edit-about">
                <h2 style="font-family:var(--font-mono);font-size:1.3rem;margin-bottom:20px">编辑 · 关于我</h2>

                <div class="edit-section">
                    <h3>自我介绍 · 第一段</h3>
                    <div class="preview-box" id="prev-about-p1"></div>
                    <div class="edit-row"><label>第一段</label><textarea id="ed-about-p1" oninput="livePrev('about-p1')"></textarea></div>
                </div>

                <div class="edit-section">
                    <h3>自我介绍 · 第二段</h3>
                    <div class="preview-box" id="prev-about-p2"></div>
                    <div class="edit-row"><label>第二段</label><textarea id="ed-about-p2" oninput="livePrev('about-p2')"></textarea></div>
                </div>

                <div class="edit-section">
                    <h3>自我介绍 · 第三段</h3>
                    <div class="preview-box" id="prev-about-p3"></div>
                    <div class="edit-row"><label>第三段</label><textarea id="ed-about-p3" oninput="livePrev('about-p3')"></textarea></div>
                </div>

                <button class="btn-save" onclick="saveContent('about')">保存关于我</button><span class="save-ok" id="status-about"></span>
            </div>

            <!-- ====== Edit Contact ====== -->
            <div class="panel" id="edit-contact">
                <h2 style="font-family:var(--font-mono);font-size:1.3rem;margin-bottom:20px">编辑 · 联系方式</h2>

                <div class="edit-section">
                    <h3>联系方式</h3>
                    <div class="sec-desc">联系我页面中展示的各项信息</div>
                    <div class="preview-box" id="prev-contact-all"></div>
                    <div class="edit-row"><label>邮箱</label><input id="ed-contact-email" oninput="livePrev('contact')"></div>
                    <div class="edit-row"><label>电话</label><input id="ed-contact-phone" oninput="livePrev('contact')"></div>
                    <div class="edit-row"><label>QQ</label><input id="ed-contact-qq" oninput="livePrev('contact')"></div>
                    <div class="edit-row"><label>GitHub</label><input id="ed-contact-github" oninput="livePrev('contact')"></div>
                    <div class="edit-row"><label>所在地</label><input id="ed-contact-location" oninput="livePrev('contact')"></div>
                </div>

                <button class="btn-save" onclick="saveContent('contact')">保存联系方式</button><span class="save-ok" id="status-contact"></span>
            </div>

            <!-- ====== Messages ====== -->
            <div class="panel" id="messages-panel">
                <h2 style="font-family:var(--font-mono);font-size:1.3rem;margin-bottom:20px">留言管理</h2>
                <div id="messages-list"></div>
            </div>

            <!-- ====== Account ====== -->
            <div class="panel" id="account-panel">
                <h2 style="font-family:var(--font-mono);font-size:1.3rem;margin-bottom:20px">账号设置</h2>

                <div class="edit-section acct-block">
                    <h4>修改用户名</h4>
                    <div class="acct-row"><label>新用户名</label><input id="acct-new-user"></div>
                    <div class="acct-row"><label>当前密码（验证）</label><input type="password" id="acct-user-pwd"></div>
                    <button class="btn-save" onclick="changeUsername()">修改用户名</button><span class="save-ok" id="status-username"></span>
                </div>

                <div class="edit-section acct-block">
                    <h4>修改密码</h4>
                    <div class="acct-row"><label>原密码</label><input type="password" id="acct-old-pwd"></div>
                    <div class="acct-row"><label>新密码</label><input type="password" id="acct-new-pwd"></div>
                    <button class="btn-save" onclick="changePassword()">修改密码</button><span class="save-ok" id="status-password"></span>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let token = '';

// ===== Login =====
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = new URLSearchParams();
    body.append('username', document.getElementById('login-user').value);
    body.append('password', document.getElementById('login-pass').value);
    try {
        const res = await fetch('/api/admin/login', { method: 'POST', body });
        if (res.ok) {
            const data = await res.json();
            token = data.token;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadAllEditors();
            loadMessages();
        } else {
            document.getElementById('login-error').textContent = '用户名或密码错误';
        }
    } catch { document.getElementById('login-error').textContent = '网络错误'; }
});

function logout() {
    fetch('/api/admin/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(()=>{});
    token = ''; document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

// ===== Sidebar =====
document.querySelectorAll('.sidebar a').forEach(a => {
    a.addEventListener('click', () => {
        document.querySelectorAll('.sidebar a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(a.dataset.panel).classList.add('active');
    });
});

// ===== Live Preview =====
function livePrev(type) {
    if (type === 'hero-name') {
        document.getElementById('prev-hero-name').textContent = document.getElementById('ed-hero-name').value || '（空）';
    } else if (type === 'hero-subtitle') {
        document.getElementById('prev-hero-subtitle').textContent = document.getElementById('ed-hero-subtitle').value || '（空）';
    } else if (type === 'hero-phrases') {
        const v = document.getElementById('ed-hero-phrases').value;
        document.getElementById('prev-hero-phrases').textContent = v ? v.split(',').map(s=>s.trim()).filter(Boolean).join(' | ') : '（空）';
    } else if (type === 'about-p1') {
        document.getElementById('prev-about-p1').textContent = document.getElementById('ed-about-p1').value || '（空）';
    } else if (type === 'about-p2') {
        document.getElementById('prev-about-p2').textContent = document.getElementById('ed-about-p2').value || '（空）';
    } else if (type === 'about-p3') {
        document.getElementById('prev-about-p3').textContent = document.getElementById('ed-about-p3').value || '（空）';
    } else if (type === 'contact') {
        const fields = ['email','phone','qq','github','location'];
        const vals = fields.map(f => document.getElementById('ed-contact-'+f).value || '（空）');
        document.getElementById('prev-contact-all').innerHTML =
            fields.map((f,i) => `<strong>${f}:</strong> ${esc(vals[i])}`).join('<br>');
    }
}

// ===== Load Editors =====
async function loadAllEditors() {
    try {
        const res = await fetch('/api/content');
        const data = await res.json();

        // Hero
        if (data.hero) {
            document.getElementById('ed-hero-name').value = data.hero.name || '';
            document.getElementById('ed-hero-subtitle').value = data.hero.subtitle || '';
            document.getElementById('ed-hero-phrases').value = (data.hero.phrases || []).join(', ');
            livePrev('hero-name'); livePrev('hero-subtitle'); livePrev('hero-phrases');
        }
        // About
        if (data.about) {
            document.getElementById('ed-about-p1').value = data.about.p1 || '';
            document.getElementById('ed-about-p2').value = data.about.p2 || '';
            document.getElementById('ed-about-p3').value = data.about.p3 || '';
            livePrev('about-p1'); livePrev('about-p2'); livePrev('about-p3');
        }
        // Contact
        if (data.contact) {
            document.getElementById('ed-contact-email').value = data.contact.email || '';
            document.getElementById('ed-contact-phone').value = data.contact.phone || '';
            document.getElementById('ed-contact-qq').value = data.contact.qq || '';
            document.getElementById('ed-contact-github').value = data.contact.github || '';
            document.getElementById('ed-contact-location').value = data.contact.location || '';
            livePrev('contact');
        }
    } catch (e) {
        console.error('Failed to load content:', e);
    }
}

// ===== Save Content =====
async function saveContent(key) {
    let payload = {};
    switch (key) {
        case 'hero':
            payload = {
                name: document.getElementById('ed-hero-name').value,
                subtitle: document.getElementById('ed-hero-subtitle').value,
                phrases: document.getElementById('ed-hero-phrases').value.split(',').map(s=>s.trim()).filter(Boolean),
            }; break;
        case 'about':
            payload = {
                p1: document.getElementById('ed-about-p1').value,
                p2: document.getElementById('ed-about-p2').value,
                p3: document.getElementById('ed-about-p3').value,
            }; break;
        case 'contact':
            payload = {
                email: document.getElementById('ed-contact-email').value,
                phone: document.getElementById('ed-contact-phone').value,
                qq: document.getElementById('ed-contact-qq').value,
                github: document.getElementById('ed-contact-github').value,
                location: document.getElementById('ed-contact-location').value,
            }; break;
    }
    const el = document.getElementById('status-'+key);
    try {
        const res = await fetch('/api/admin/content/'+key, {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        if (res.ok) { el.textContent = '已保存'; el.style.color = 'var(--success)'; }
        else { el.textContent = '保存失败'; el.style.color = 'var(--danger)'; }
    } catch { el.textContent = '网络错误'; el.style.color = 'var(--danger)'; }
    setTimeout(()=>{ el.textContent = ''; }, 2500);
}

// ===== Messages =====
async function loadMessages() {
    try {
        const res = await fetch('/api/admin/messages', { headers: { 'Authorization': 'Bearer '+token } });
        const msgs = await res.json();
        const list = document.getElementById('messages-list');
        if (!msgs.length) { list.innerHTML = '<div class="empty-msg">暂无留言</div>'; document.getElementById('unread-badge').textContent='0'; return; }
        let unread = 0;
        list.innerHTML = msgs.map(m => {
            if (!m.is_read) unread++;
            return `<div class="msg-card ${m.is_read?'':'unread'}">
                <div class="msg-top"><strong>${esc(m.name)}</strong><span class="time">${m.created_at}</span></div>
                <div class="msg-email">${esc(m.email)}</div>
                <div class="msg-body">${esc(m.message)}</div>
                <div class="msg-acts">
                    ${m.is_read?'':'<button onclick="markRead('+m.id+')">标为已读</button>'}
                    <button class="del" onclick="delMsg('+m.id+')">删除</button>
                </div></div>`;
        }).join('');
        document.getElementById('unread-badge').textContent = unread;
    } catch(e) { console.error(e); }
}

async function markRead(id) {
    await fetch('/api/admin/messages/'+id+'/read', { method:'POST', headers:{'Authorization':'Bearer '+token} });
    loadMessages();
}
async function delMsg(id) {
    if (!confirm('确认删除？')) return;
    await fetch('/api/admin/messages/'+id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} });
    loadMessages();
}

// ===== Account =====
async function changeUsername() {
    const nu = document.getElementById('acct-new-user').value;
    const pw = document.getElementById('acct-user-pwd').value;
    if (!nu) return;
    const body = new URLSearchParams(); body.append('new_username', nu); body.append('password', pw);
    try {
        const res = await fetch('/api/admin/change-username', { method:'POST', headers:{'Authorization':'Bearer '+token}, body });
        const el = document.getElementById('status-username');
        if (res.ok) { el.textContent = '已修改，下次请用新用户名登录'; el.style.color = 'var(--success)'; }
        else { const e = await res.json(); el.textContent = e.detail || '失败'; el.style.color = 'var(--danger)'; }
    } catch { document.getElementById('status-username').textContent = '网络错误'; }
}
async function changePassword() {
    const op = document.getElementById('acct-old-pwd').value;
    const np = document.getElementById('acct-new-pwd').value;
    if (!np) return;
    const body = new URLSearchParams(); body.append('old_password', op); body.append('new_password', np);
    try {
        const res = await fetch('/api/admin/change-password', { method:'POST', headers:{'Authorization':'Bearer '+token}, body });
        const el = document.getElementById('status-password');
        if (res.ok) { el.textContent = '密码已修改'; el.style.color = 'var(--success)'; }
        else { const e = await res.json(); el.textContent = e.detail || '失败'; el.style.color = 'var(--danger)'; }
    } catch { document.getElementById('status-password').textContent = '网络错误'; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
