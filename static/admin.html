<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 个人主页</title>
    <style>
        :root {
            --bg: #0e0c1e; --card: rgba(22,28,50,0.55); --border: rgba(120,135,210,0.15);
            --text: #d8ddf8; --text2: #98a0c8; --text3: #6870a0;
            --accent: #818cf8; --accent2: #a78bfa; --danger: #ef4444; --success: #22c55e;
            --radius: 14px; --radius-sm: 8px;
            --font: 'Segoe UI', -apple-system, sans-serif;
            --font-mono: 'Cascadia Code', 'Fira Code', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

        /* Login */
        #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box {
            background:var(--card); backdrop-filter:blur(14px); border:1px solid var(--border);
            border-radius:var(--radius); padding:40px; width:380px; max-width:90vw;
        }
        .login-box h1 { font-size:1.6rem; margin-bottom:6px; font-family:var(--font-mono); }
        .login-box .sub { color:var(--text2); font-size:0.84rem; margin-bottom:24px; }
        .login-box input { width:100%; padding:12px; margin-bottom:12px; background:rgba(0,0,0,0.35); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:0.95rem; outline:none; }
        .login-box input:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(129,140,248,0.3); }
        .login-box button { width:100%; padding:12px; background:linear-gradient(135deg,#818cf8,#a78bfa,#60a5fa); color:#fff; border:none; border-radius:var(--radius-sm); font-size:0.95rem; cursor:pointer; font-weight:600; }
        .login-err { color:var(--danger); font-size:0.84rem; margin-top:10px; text-align:center; }

        /* Dashboard */
        #dashboard { display:none; }
        .topbar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:12px 24px; background:rgba(14,12,30,0.9); backdrop-filter:blur(14px); border-bottom:1px solid rgba(255,255,255,0.06); }
        .topbar h2 { font-size:1rem; font-family:var(--font-mono); }
        .topbar button { padding:6px 16px; background:var(--danger); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:0.82rem; }
        .layout { display:flex; padding-top:52px; min-height:100vh; }
        .sidebar { position:fixed; top:52px; left:0; bottom:0; width:200px; background:rgba(14,12,28,0.6); border-right:1px solid rgba(255,255,255,0.05); padding:12px 0; overflow-y:auto; z-index:50; }
        .sidebar a { display:flex; align-items:center; gap:8px; padding:10px 20px; color:var(--text2); font-size:0.86rem; cursor:pointer; text-decoration:none; border-left:2px solid transparent; transition:all 0.2s; }
        .sidebar a:hover, .sidebar a.active { color:var(--text); background:rgba(255,255,255,0.03); border-left-color:var(--accent); }
        .sidebar .badge { background:var(--danger); color:#fff; font-size:0.66rem; padding:1px 7px; border-radius:10px; margin-left:auto; }
        .content { margin-left:200px; flex:1; padding:28px; min-width:0; }

        .panel { display:none; }
        .panel.active { display:block; }

        /* Editor sections */
        .section-card { background:var(--card); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:18px; }
        .section-card h3 { font-family:var(--font-mono); font-size:0.95rem; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
        .section-card .desc { font-size:0.78rem; color:var(--text3); margin-bottom:14px; }
        .section-card .preview { background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-sm); padding:14px; margin-bottom:12px; font-size:0.88rem; color:var(--text2); min-height:36px; line-height:1.5; white-space:pre-wrap; }
        .section-card .preview:empty::before { content:'（空）'; color:var(--text3); font-style:italic; }
        .field { margin-bottom:10px; }
        .field label { display:block; font-size:0.76rem; color:var(--text3); margin-bottom:4px; font-family:var(--font-mono); }
        .field input, .field textarea { width:100%; padding:10px 12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius-sm); color:var(--text); font-size:0.88rem; outline:none; font-family:var(--font); }
        .field textarea { min-height:80px; resize:vertical; }
        .field input:focus, .field textarea:focus { border-color:var(--accent); box-shadow:0 0 8px rgba(129,140,248,0.25); }
        .btn-save { padding:9px 22px; background:linear-gradient(135deg,#818cf8,#a78bfa); color:#fff; border:none; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.84rem; }
        .btn-save:hover { box-shadow:0 4px 16px rgba(129,140,248,0.4); }
        .save-ok { font-size:0.8rem; margin-left:10px; }

        /* Messages */
        .msg-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
        .msg-card.unread { border-left:3px solid var(--accent); }
        .msg-top { display:flex; justify-content:space-between; margin-bottom:6px; }
        .msg-top strong { font-size:0.92rem; }
        .msg-top span { font-size:0.76rem; color:var(--text3); }
        .msg-email { font-size:0.78rem; color:var(--text3); margin-bottom:8px; }
        .msg-body { font-size:0.86rem; line-height:1.5; margin-bottom:8px; }
        .msg-acts { display:flex; gap:8px; }
        .msg-acts button { padding:5px 14px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:var(--text2); border-radius:5px; cursor:pointer; font-size:0.76rem; }
        .msg-acts button:hover { border-color:var(--accent); color:var(--accent); }
        .msg-acts button.danger:hover { border-color:var(--danger); color:var(--danger); }
        .empty-hint { color:var(--text3); text-align:center; padding:40px; }

        /* Account */
        .acct { margin-bottom:20px; }

        @media (max-width:700px) {
            .layout { flex-direction:column; }
            .sidebar { position:static; width:100%; display:flex; overflow-x:auto; padding:6px 0; border-right:none; border-bottom:1px solid rgba(255,255,255,0.05); }
            .sidebar a { white-space:nowrap; border-left:none; border-bottom:2px solid transparent; font-size:0.8rem; padding:8px 14px; }
            .sidebar a.active { border-left:none; border-bottom-color:var(--accent); }
            .content { margin-left:0; padding:20px 14px; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
    <form class="login-box" id="login-form" autocomplete="off">
        <h1>管理后台</h1>
        <div class="sub">登录以编辑网站内容和查看留言</div>
        <input type="text" id="login-user" placeholder="用户名" required>
        <input type="password" id="login-pass" placeholder="密码" required>
        <button type="submit">登 录</button>
        <div class="login-err" id="login-error"></div>
    </form>
</div>

<!-- Dashboard -->
<div id="dashboard">
    <div class="topbar">
        <h2>&lt;Admin /&gt;</h2>
        <button onclick="logout()">退出登录</button>
    </div>
    <div class="layout">
        <nav class="sidebar">
            <a class="active" data-panel="edit-home">首页内容</a>
            <a data-panel="edit-about">关于我</a>
            <a data-panel="edit-contact">联系方式</a>
            <a data-panel="messages-panel">留言管理 <span class="badge" id="unread-badge">0</span></a>
            <a data-panel="account-panel">账号设置</a>
        </nav>
        <div class="content">

            <!-- Home -->
            <div class="panel active" id="edit-home">
                <h2 style="font-family:var(--font-mono);font-size:1.2rem;margin-bottom:18px">编辑 · 首页</h2>
                <div class="section-card"><h3>姓名</h3><div class="desc">首页大标题中高亮显示</div><div class="preview" id="prev-name"></div><div class="field"><label>姓名</label><input id="ed-name" oninput="prev('name')"></div></div>
                <div class="section-card"><h3>副标题</h3><div class="desc">学校/专业/届别</div><div class="preview" id="prev-subtitle"></div><div class="field"><label>副标题</label><input id="ed-subtitle" oninput="prev('subtitle')"></div></div>
                <div class="section-card"><h3>打字机短语</h3><div class="desc">逗号分隔，首页轮播显示</div><div class="preview" id="prev-phrases"></div><div class="field"><label>短语（逗号分隔）</label><input id="ed-phrases" oninput="prev('phrases')"></div></div>
                <button class="btn-save" onclick="save('hero')">保存首页</button><span class="save-ok" id="status-hero"></span>
            </div>

            <!-- About -->
            <div class="panel" id="edit-about">
                <h2 style="font-family:var(--font-mono);font-size:1.2rem;margin-bottom:18px">编辑 · 关于我</h2>
                <div class="section-card"><h3>自我介绍 · 第一段</h3><div class="preview" id="prev-p1"></div><div class="field"><label>第一段</label><textarea id="ed-p1" oninput="prev('p1')"></textarea></div></div>
                <div class="section-card"><h3>自我介绍 · 第二段</h3><div class="preview" id="prev-p2"></div><div class="field"><label>第二段</label><textarea id="ed-p2" oninput="prev('p2')"></textarea></div></div>
                <div class="section-card"><h3>自我介绍 · 第三段</h3><div class="preview" id="prev-p3"></div><div class="field"><label>第三段</label><textarea id="ed-p3" oninput="prev('p3')"></textarea></div></div>
                <button class="btn-save" onclick="save('about')">保存关于我</button><span class="save-ok" id="status-about"></span>
            </div>

            <!-- Contact -->
            <div class="panel" id="edit-contact">
                <h2 style="font-family:var(--font-mono);font-size:1.2rem;margin-bottom:18px">编辑 · 联系方式</h2>
                <div class="section-card"><h3>联系方式</h3><div class="preview" id="prev-contact"></div>
                <div class="field"><label>邮箱</label><input id="ed-email" oninput="prev('contact')"></div>
                <div class="field"><label>电话</label><input id="ed-phone" oninput="prev('contact')"></div>
                <div class="field"><label>QQ</label><input id="ed-qq" oninput="prev('contact')"></div>
                <div class="field"><label>GitHub</label><input id="ed-github" oninput="prev('contact')"></div>
                <div class="field"><label>所在地</label><input id="ed-location" oninput="prev('contact')"></div></div>
                <button class="btn-save" onclick="save('contact')">保存联系方式</button><span class="save-ok" id="status-contact"></span>
            </div>

            <!-- Messages -->
            <div class="panel" id="messages-panel">
                <h2 style="font-family:var(--font-mono);font-size:1.2rem;margin-bottom:18px">留言管理</h2>
                <div id="messages-list"></div>
            </div>

            <!-- Account -->
            <div class="panel" id="account-panel">
                <h2 style="font-family:var(--font-mono);font-size:1.2rem;margin-bottom:18px">账号设置</h2>
                <div class="section-card acct"><h3>修改用户名</h3><div class="field"><label>新用户名</label><input id="acct-user"></div><div class="field"><label>当前密码（验证）</label><input type="password" id="acct-user-pwd"></div><button class="btn-save" onclick="changeUsername()">修改用户名</button><span class="save-ok" id="status-username"></span></div>
                <div class="section-card acct"><h3>修改密码</h3><div class="field"><label>原密码</label><input type="password" id="acct-old-pwd"></div><div class="field"><label>新密码</label><input type="password" id="acct-new-pwd"></div><button class="btn-save" onclick="changePassword()">修改密码</button><span class="save-ok" id="status-password"></span></div>
            </div>
        </div>
    </div>
</div>

<script>
let token = '';

// ===== Login =====
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = new URLSearchParams();
    body.append('username', document.getElementById('login-user').value);
    body.append('password', document.getElementById('login-pass').value);
    try {
        const res = await fetch('/api/admin/login', { method: 'POST', body });
        if (res.ok) {
            const data = await res.json();
            token = data.token;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadEditors();
            loadMessages();
        } else {
            document.getElementById('login-error').textContent = '用户名或密码错误';
        }
    } catch { document.getElementById('login-error').textContent = '网络错误，请稍后重试'; }
});

function logout() {
    fetch('/api/admin/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(()=>{});
    token = ''; document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

// ===== Sidebar =====
document.querySelectorAll('.sidebar a').forEach(a => {
    a.addEventListener('click', () => {
        document.querySelectorAll('.sidebar a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(a.dataset.panel).classList.add('active');
        if (a.dataset.panel === 'messages-panel') loadMessages();
    });
});

// ===== Live Preview =====
function prev(type) {
    if (type === 'name') { document.getElementById('prev-name').textContent = document.getElementById('ed-name').value || '（空）'; }
    else if (type === 'subtitle') { document.getElementById('prev-subtitle').textContent = document.getElementById('ed-subtitle').value || '（空）'; }
    else if (type === 'phrases') { const v = document.getElementById('ed-phrases').value; document.getElementById('prev-phrases').textContent = v ? v.split(',').map(s=>s.trim()).filter(Boolean).join(' | ') : '（空）'; }
    else if (type === 'p1') { document.getElementById('prev-p1').textContent = document.getElementById('ed-p1').value || '（空）'; }
    else if (type === 'p2') { document.getElementById('prev-p2').textContent = document.getElementById('ed-p2').value || '（空）'; }
    else if (type === 'p3') { document.getElementById('prev-p3').textContent = document.getElementById('ed-p3').value || '（空）'; }
    else if (type === 'contact') {
        const f = ['email','phone','qq','github','location'];
        const v = f.map(k => document.getElementById('ed-'+k).value || '（空）');
        document.getElementById('prev-contact').innerHTML = f.map((k,i) => '<strong>'+k+':</strong> '+esc(v[i])).join('<br>');
    }
}

// ===== Load Editors =====
async function loadEditors() {
    try {
        const res = await fetch('/api/content');
        const data = await res.json();
        if (data.hero) {
            document.getElementById('ed-name').value = data.hero.name || '';
            document.getElementById('ed-subtitle').value = data.hero.subtitle || '';
            document.getElementById('ed-phrases').value = (data.hero.phrases || []).join(', ');
            prev('name'); prev('subtitle'); prev('phrases');
        }
        if (data.about) {
            document.getElementById('ed-p1').value = data.about.p1 || '';
            document.getElementById('ed-p2').value = data.about.p2 || '';
            document.getElementById('ed-p3').value = data.about.p3 || '';
            prev('p1'); prev('p2'); prev('p3');
        }
        if (data.contact) {
            document.getElementById('ed-email').value = data.contact.email || '';
            document.getElementById('ed-phone').value = data.contact.phone || '';
            document.getElementById('ed-qq').value = data.contact.qq || '';
            document.getElementById('ed-github').value = data.contact.github || '';
            document.getElementById('ed-location').value = data.contact.location || '';
            prev('contact');
        }
    } catch (e) { console.error('Load failed:', e); }
}

// ===== Save =====
async function save(key) {
    let payload = {};
    if (key === 'hero') {
        payload = { name: document.getElementById('ed-name').value, subtitle: document.getElementById('ed-subtitle').value, phrases: document.getElementById('ed-phrases').value.split(',').map(s=>s.trim()).filter(Boolean) };
    } else if (key === 'about') {
        payload = { p1: document.getElementById('ed-p1').value, p2: document.getElementById('ed-p2').value, p3: document.getElementById('ed-p3').value };
    } else if (key === 'contact') {
        payload = { email: document.getElementById('ed-email').value, phone: document.getElementById('ed-phone').value, qq: document.getElementById('ed-qq').value, github: document.getElementById('ed-github').value, location: document.getElementById('ed-location').value };
    }
    const el = document.getElementById('status-'+key);
    try {
        const res = await fetch('/api/admin/content/'+key, { method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        el.textContent = res.ok ? '已保存' : '保存失败';
        el.style.color = res.ok ? 'var(--success)' : 'var(--danger)';
    } catch { el.textContent = '网络错误'; el.style.color = 'var(--danger)'; }
    setTimeout(()=>{ el.textContent=''; }, 2500);
}

// ===== Messages =====
async function loadMessages() {
    try {
        const res = await fetch('/api/admin/messages', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) { document.getElementById('messages-list').innerHTML = '<div class="empty-hint">加载失败，请确认已登录</div>'; return; }
        const msgs = await res.json();
        if (!msgs.length) { document.getElementById('messages-list').innerHTML = '<div class="empty-hint">暂无留言</div>'; document.getElementById('unread-badge').textContent='0'; return; }
        let unread = 0;
        document.getElementById('messages-list').innerHTML = msgs.map(m => {
            if (!m.is_read) unread++;
            return '<div class="msg-card'+(m.is_read?'':' unread')+'">'
                +'<div class="msg-top"><strong>'+esc(m.name)+'</strong><span>'+m.created_at+'</span></div>'
                +'<div class="msg-email">'+esc(m.email)+'</div>'
                +'<div class="msg-body">'+esc(m.message)+'</div>'
                +'<div class="msg-acts">'
                +(m.is_read?'':'<button onclick="markRead('+m.id+')">标为已读</button>')
                +'<button class="danger" onclick="delMsg('+m.id+')">删除</button>'
                +'</div></div>';
        }).join('');
        document.getElementById('unread-badge').textContent = unread;
    } catch (e) { console.error(e); }
}

async function markRead(id) {
    await fetch('/api/admin/messages/'+id+'/read', { method:'POST', headers:{'Authorization':'Bearer '+token} });
    loadMessages();
}

async function delMsg(id) {
    if (!confirm('确认删除这条留言？')) return;
    try {
        const res = await fetch('/api/admin/messages/'+id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} });
        if (res.ok) { loadMessages(); }
        else { alert('删除失败，请重新登录后重试'); }
    } catch { alert('网络错误'); }
}

// ===== Account =====
async function changeUsername() {
    const nu = document.getElementById('acct-user').value, pw = document.getElementById('acct-user-pwd').value;
    if (!nu) return;
    const body = new URLSearchParams(); body.append('new_username', nu); body.append('password', pw);
    try {
        const res = await fetch('/api/admin/change-username', { method:'POST', headers:{'Authorization':'Bearer '+token}, body });
        const el = document.getElementById('status-username');
        el.textContent = res.ok ? '已修改，下次用新用户名登录' : '修改失败';
        el.style.color = res.ok ? 'var(--success)' : 'var(--danger)';
        if (!res.ok) { const e = await res.json(); el.textContent = e.detail || '修改失败'; }
    } catch { document.getElementById('status-username').textContent = '网络错误'; }
}

async function changePassword() {
    const op = document.getElementById('acct-old-pwd').value, np = document.getElementById('acct-new-pwd').value;
    if (!np) return;
    const body = new URLSearchParams(); body.append('old_password', op); body.append('new_password', np);
    try {
        const res = await fetch('/api/admin/change-password', { method:'POST', headers:{'Authorization':'Bearer '+token}, body });
        const el = document.getElementById('status-password');
        el.textContent = res.ok ? '密码已修改' : '修改失败';
        el.style.color = res.ok ? 'var(--success)' : 'var(--danger)';
        if (!res.ok) { const e = await res.json(); el.textContent = e.detail || '修改失败'; }
    } catch { document.getElementById('status-password').textContent = '网络错误'; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
